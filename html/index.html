<!DOCTYPE html><html lang="hu"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ESP Clock</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;padding:20px}.c{max-width:400px;margin:0 auto}h1{text-align:center;margin-bottom:24px;color:#0df}.d{background:#16213e;border-radius:12px;padding:20px;margin-bottom:16px}.d h2{font-size:14px;text-transform:uppercase;color:#888;margin-bottom:12px}.t{font-size:48px;font-weight:700;text-align:center;font-family:monospace;color:#0df}.tp{font-size:24px;text-align:center;font-family:monospace;color:#888;margin-top:8px}label{display:block;font-size:12px;color:#888;margin:12px 0 4px}label:first-of-type{margin-top:0}input[type=text],input[type=number]{width:100%;padding:10px 12px;border:none;border-radius:8px;background:#0f0f23;color:#eee;font-size:16px}input[type=color]{width:100%;height:44px;border:none;border-radius:8px;background:#0f0f23;cursor:pointer}button{width:100%;padding:12px;border:none;border-radius:8px;background:#0df;color:#1a1a2e;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px}.m{text-align:center;padding:8px;border-radius:6px;margin-top:12px;font-size:14px;display:none}.m.ok{display:block;background:#0a3d2a;color:#4ade80}.m.er{display:block;background:#3d0a0a;color:#f87171}.h{font-size:11px;color:#666;margin-top:12px}</style></head><body><div class="c"><h1>ESP Clock</h1><div class="d"><h2>Statusz</h2><div class="t" id="ti">--:--</div><div class="tp" id="te">--°C</div></div><div class="d"><h2>Uzenet</h2><label>Szoveg</label><input type="text" id="nt" placeholder="Hello"><label>Szin</label><input type="color" id="nc" value="#ff0000"><label>Sebesseg</label><input type="number" id="ns" value="0.3" step="0.1" min="0.1" max="2"><button onclick="sN()">Kuldes</button><div class="m" id="nm"></div></div><div class="d"><h2>Dallam</h2><label>Dallam</label><input type="text" id="so" placeholder="0 D4 1 0;..."><button onclick="pS()">Lejatszas</button><div class="m" id="sm"></div><p class="h">Masolhatsz: <a href="https://onlinesequencer.net" target="_blank" style="color:#0df">onlinesequencer.net</a></p></div><div class="d"><h2>Ora szine</h2><label>Szin</label><input type="color" id="cc" value="#ff0000"><button onclick="sC()">Mentes</button><div class="m" id="cm"></div></div><div class="d"><h2>Hostname</h2><label>Nev</label><input type="text" id="hn" placeholder="espclock"><button onclick="sH()">Mentes</button><div class="m" id="hm"></div><p class="h">Ujrainditas szukseges.</p></div><div class="d"><h2>WiFi</h2><label>SSID</label><input type="text" id="ws" placeholder="WiFi nev"><label>Jelszo</label><input type="text" id="wp" placeholder="Jelszo"><button onclick="sW()">Mentes</button><div class="m" id="wm"></div><p class="h">Ujrainditas szukseges.</p></div></div><script>const $=i=>document.getElementById(i),h2r=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)],r2h=c=>'#'+c.map(v=>v.toString(16).padStart(2,'0')).join(''),msg=(i,o,t)=>{let e=$(i);e.className='m '+(o?'ok':'er');e.textContent=t;setTimeout(()=>e.className='m',3e3)},uT=t=>$('ti').textContent=String(t[4]).padStart(2,'0')+':'+String(t[5]).padStart(2,'0'),uTe=t=>$('te').textContent=t.toFixed(1)+'°C',post=async(u,b)=>{let r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});return r.json()};async function lC(){try{let r=await fetch('/api/status'),d=(await r.json()).data;if(d.time)uT(d.time);if(d.temp!==undefined)uTe(d.temp);if(d.color){let h=r2h(d.color);$('cc').value=h;$('nc').value=h}if(d.host)$('hn').value=d.host;if(d.wifi_ssid)$('ws').value=d.wifi_ssid}catch(e){}}async function fT(){try{let d=(await(await fetch('/api/status')).json()).data;if(d.time)uT(d.time);if(d.temp!==undefined)uTe(d.temp)}catch(e){$('ti').textContent='--:--'}}async function sN(){try{let d=await post('/api/notification',{text:$('nt').value,color:h2r($('nc').value),sleepTime:parseFloat($('ns').value)});msg('nm',d.status,d.status?'Ok!':'Hiba')}catch(e){msg('nm',0,'Hiba')}}async function pS(){let s=$('so').value;if(!s)return msg('sm',0,'Nincs dallam');try{let d=await post('/api/song',{song:s});msg('sm',d.status,d.status?'Ok!':'Hiba')}catch(e){msg('sm',0,'Hiba')}}async function sC(){try{let d=await post('/api/config',{color:h2r($('cc').value)});msg('cm',d.status,d.status?'Ok!':'Hiba')}catch(e){msg('cm',0,'Hiba')}}async function sH(){let h=$('hn').value;if(!h)return msg('hm',0,'Ures');try{let d=await post('/api/config',{hostname:h});msg('hm',d.status,d.status?'Ok!':'Hiba')}catch(e){msg('hm',0,'Hiba')}}async function sW(){let s=$('ws').value;if(!s)return msg('wm',0,'Nincs SSID');try{let d=await post('/api/config',{wifiSSID:s,wifiPassword:$('wp').value});msg('wm',d.status,d.status?'Ok!':'Hiba')}catch(e){msg('wm',0,'Hiba')}}lC();setInterval(fT,1e4)</script></body></html>
